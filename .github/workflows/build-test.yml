name: Build the SDK with Unreal

on:
  #pull_request:
    #branches: # Made towards the following
    #  - main
    #  - release/*
    #  - dev*
    #types: # Only on the following activity
    #  - opened
    #  - synchronize # Changes to the branch like new commits, ammends, etc.
    #  - reopened
    #  - unlocked
  push:
    branches: # Made towards the following
      - ci/*
    #  - main
    #  - dev
    #tags:
    #  - v**

jobs:
  test:
    name: Unreal Engine version ${{matrix.unrealVersion}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        unrealVersion:
          - 4.27.2
          - 5.0.3
          - 5.1.1
    env:
      EngineVersion: "${{matrix.unrealVersion}}"

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v2

      - name: Add Engine version to uplugin
        run: shortEngineVersion=" ${{env.EngineVersion}}" && shortEngineVersion="${shortEngineVersion%.*}" && insertString="\"EngineVersion\":${shortEngineVersion}," && sed -i "6i\  \  $insertString" ./LootLockerSDK/LootLockerSDK.uplugin

      - name: Create Dockerfile in place
        run: |
          sdkDirectory=$(pwd)
          echo "FROM ghcr.io/epicgames/unreal-engine:dev-${{env.EngineVersion}}" >> /Dockerfile
          echo "" >> /Dockerfile
          echo "COPY $sdkDirectory/LICENSE /LootLockerSDK/LICENSE" >> /Dockerfile
          echo "COPY $sdkDirectory/README.md /LootLockerSDK/README.md" >> /Dockerfile
          echo "COPY $sdkDirectory/LootLockerSDK/Config /LootLockerSDK/LootLockerSDK/Config" >> /Dockerfile
          echo "COPY $sdkDirectory/LootLockerSDK/Resources /LootLockerSDK/LootLockerSDK/Resources" >> /Dockerfile
          echo "COPY $sdkDirectory/LootLockerSDK/Source /LootLockerSDK/LootLockerSDK/Source" >> /Dockerfile
          echo "COPY $sdkDirectory/LootLockerSDK/LootLockerSDK.uplugin /LootLockerSDK/LootLockerSDK/LootLockerSDK.uplugin" >> /Dockerfile
          cat /Dockerfile